name: Build EkonomikaPlugin

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Stáhni kód
        uses: actions/checkout@v4

      - name: Nastav Javu 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Zkompiluj pomocí Maven
        run: mvn clean package -q

      - name: Nahraj hotový JAR
        uses: actions/upload-artifact@v4
        with:
          name: EkonomikaPlugin
          path: target/EkonomikaPlugin-1.0.0.jar
